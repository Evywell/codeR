syntax = "proto3";

package fr.raven.proto.message.game;

import "game/Position.proto";

option java_outer_classname = "ObjectDescriptionProto";

message ObjectDescription {
    uint64 guid = 1;
    Position position = 2;

    message Ability {
      uint32 abilityId = 1;
      uint32 abilityInfoId = 2;
      uint64 explicitTargetGuid = 3;
      uint32 abilityState = 4;
      bool isInProgress = 5;
      uint32 remainingCastingTimeMs = 6;
    }

    repeated Ability ongoingAbilities = 3;
}

