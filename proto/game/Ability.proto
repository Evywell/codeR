syntax = "proto3";

package fr.raven.proto.message.game;

option java_outer_classname = "AbilityProto";

message UseAbility {
  uint32 abilityId = 1;
  uint64 explicitTargetGuid = 2;
}

message AbilityStateUpdate {
    uint64 sourceGuid = 1;
    uint32 abilityId = 2;
    uint32 abilityInfoId = 3;
    uint32 abilityState = 4;
    uint32 castingTimeMs = 5;
    uint32 elapsedCastingTimeMs = 6;
}
